<!DOCTYPE html> 
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameList Pro - Painel de Acesso</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="auth-container">
        <h1 class="main-title">GAMELIST <span>PRO</span></h1>
        
        <div class="auth-tabs" id="navigation-tabs">
            <button type="button" class="tab-button active" id="tab-btn-cliente">Acesso Cliente</button>
            <button type="button" class="tab-button" id="tab-btn-admin">Painel Admin</button>
        </div>

        <div id="section-login-cliente" class="form-section active">
            <form id="form-cliente-login" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="cliente-username">Username do Usuário</label>
                    <input type="text" id="cliente-username" placeholder="Digite seu username cadastrado" required>
                </div>
                <div class="form-group">
                    <label for="cliente-senha">Senha Master Corporativa</label>
                    <input type="password" id="cliente-senha" placeholder="Digite a senha master" required>
                </div>
                <button type="submit" class="btn-submit-neon">Entrar no Sistema</button>
                <p class="toggle-form-text">Ainda não tem uma conta ativa? <span id="link-abrir-cadastro">Cadastre-se aqui</span></p>
            </form>
        </div>

        <div id="section-cadastro-cliente" class="form-section">
            <form id="form-cliente-cadastro" onsubmit="event.preventDefault();">
                <div class="form-group-row">
                    <div class="form-group-column">
                        <label for="cadastro-username">Username Único</label>
                        <input type="text" id="cadastro-username" placeholder="Exemplo: jorginho" required>
                    </div>
                    <div class="form-group-column">
                        <label for="cadastro-nome">Primeiro Nome</label>
                        <input type="text" id="cadastro-nome" placeholder="Digite seu nome" required>
                    </div>
                </div>

                <div class="form-group-row">
                    <div class="form-group-column">
                        <label for="cadastro-sobrenome">Sobrenome</label>
                        <input type="text" id="cadastro-sobrenome" placeholder="Digite seu sobrenome" required>
                    </div>
                    <div class="form-group-column">
                        <label for="cadastro-whatsapp">Número do WhatsApp</label>
                        <input type="tel" id="cadastro-whatsapp" placeholder="Exemplo: 11999999999" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cadastro-cidade">Cidade ou Região</label>
                    <input type="text" id="cadastro-cidade" placeholder="Digite sua cidade de residência" required>
                </div>

                <div class="form-group">
                    <label for="cadastro-senha-master">Senha Master de Validação</label>
                    <input type="password" id="cadastro-senha-master" placeholder="Digite a senha master para liberar" required>
                </div>

                <button type="submit" class="btn-submit-neon">Finalizar Meu Cadastro</button>
                <p class="toggle-form-text">Já possui uma conta criada? <span id="link-voltar-login">Faça Login</span></p>
            </form>
        </div>

        <div id="section-login-admin" class="form-section">
            <form id="form-admin-login" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="admin-email">E-mail do Administrador</label>
                    <input type="email" id="admin-email" placeholder="admin@sistema.com" required>
                </div>
                <div class="form-group">
                    <label for="admin-senha">Senha de Acesso Admin</label>
                    <input type="password" id="admin-senha" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit-neon btn-admin-color">Acessar Painel Master</button>
            </form>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
